<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mock Test Application</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>Welcome to the Mock Test Application</h1>
    </header>
    <main>
        <section id="instructions">
            <h2>Instructions</h2>
            <p>Complete the mock test below:</p>
        </section>
        <section id="mock-test">
            <h2>Mock Test Questions</h2>
            <form action="#" method="POST">
                <div class="question">
                    <p>1. What is the capital of France?</p>
                    <label><input type="radio" name="q1" value="a"> A) Berlin</label><br>
                    <label><input type="radio" name="q1" value="b"> B) Madrid</label><br>
                    <label><input type="radio" name="q1" value="c"> C) Paris</label><br>
                    <label><input type="radio" name="q1" value="d"> D) Rome</label>
                </div>
                <div class="question">
                    <p>2. Which planet is known as the Red Planet?</p>
                    <label><input type="radio" name="q2" value="a"> A) Earth</label><br>
                    <label><input type="radio" name="q2" value="b"> B) Mars</label><br>
                    <label><input type="radio" name="q2" value="c"> C) Jupiter</label><br>
                    <label><input type="radio" name="q2" value="d"> D) Saturn</label>
                </div>
                <button type="submit">Submit</button>
            </form>
        </section>
    </main>
    <footer>
        <p>&copy; 2026 Mock Test Application</p>
    </footer>
</body>
</html>
